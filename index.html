Sai lầm kinh điển của sinh viên là thay thế VCB tương đương ngay lập tức khi chúng nằm trong một **phép trừ**. 
Khi các em viết $\sin(x) \approx x$, thực chất các em đã vứt bỏ các thành phần bậc cao hơn như $x^3, x^5$. Nếu bài toán là phép nhân/chia, việc này hoàn toàn ổn. Nhưng nếu là phép trừ như $\sin(x) - x$, các thành phần chính $x - x$ triệt tiêu mất tiêu, khiến kết quả tiến về 0 một cách sai lầm. Cái quyết định giới hạn lúc này chính là những phần bậc cao các em vừa vứt đi!

#### Bước 3: Giải ví dụ minh họa
Tính giới hạn: $L = \lim_{x \to 0} \frac{\sin(x) - x}{x^3}$
Khai triển Maclaurin của $\sin(x)$ đến bậc 3:
$$\sin(x) = x - \frac{x^3}{3!} + o(x^3) = x - \frac{x^3}{6} + o(x^3)$$
Thế vào tử số:
$$\sin(x) - x = \left(x - \frac{x^3}{6} + o(x^3)\right) - x = -\frac{x^3}{6} + o(x^3)$$
Bây giờ, chia cho mẫu số $x^3$:
$$L = \lim_{x \to 0} \frac{-\frac{x^3}{6} + o(x^3)}{x^3} = -\frac{1}{6}$$
Kết quả cực kỳ chính xác và đẹp đẽ!`
